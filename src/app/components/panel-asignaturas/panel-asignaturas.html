<div class="p-3 panel-asignaturas">
  <div class="topbar">
    <h1>Ofertas del periodo</h1>
    <button type="button" class="btn btn-primary" (click)="abrirSelector.emit()">
      <i class="ti ti-plus"></i> Nueva oferta
    </button>
  </div>

  @if (ofertasPanel.length === 0) {
    <div class="empty-state">
      <i class="bi bi-bookmark-x"></i>
      <p>No hay ofertas registradas.<br />Crea la primera con <strong>Nueva oferta</strong>.</p>
    </div>
  }

  @for (
    item of ofertasPanel;
    track item.grupo.id + '-' + item.horario.dia + '-' + item.horario.horaInicio + '-' + $index
  ) {
    <app-oferta-card
      class="d-block mb-3"
      [item]="item"
      modo="panel"
      [seleccionada]="esSeleccionada(item)"
      (seleccionar)="seleccionar(item)"
      (editar)="onEditar($event)"
      (eliminar)="onEliminar($event)"
    >
    </app-oferta-card>
  }
</div>
