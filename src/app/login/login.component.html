<div class="login-page">
  <div class="login-wrapper">
    <form class="login-container shadow-lg" [formGroup]="loginForm" (ngSubmit)="logIn()">
      <div class="login-header text-center">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Portal de la Universidad de Nueva York</p>
      </div>

      <div class="form-body">
        <div class="form-group mb-4">
          <label class="form-label font-weight-bold">RUT</label>
          <input formControlName="rut" type="text" appRutFormat class="form-control" placeholder="12.345.678-9">
        </div>

        <div class="form-group mb-4">
          <label class="form-label font-weight-bold">Contraseña</label>
          <input formControlName="password" type="password" class="form-control" placeholder="••••••••">
        </div>

        <button class="btn-login btn btn-block w-100" type="submit">
          Acceder
        </button>
      </div>
    </form>
  </div>
</div>
