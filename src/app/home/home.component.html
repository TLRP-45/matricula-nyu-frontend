<div class="dashboard-simple">
  <div class="welcome-header">
    <h1>Bienvenido, {{ user?.nombre }}</h1>
    <p>Selecciona una opción para continuar</p>
    
    <div class="mt-3">
      @if (matriculado) {
        <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 rounded-pill fw-semibold shadow-sm d-inline-flex align-items-center gap-1">
          ✔ Matrícula Activa (Habilitado)
        </span>
      } @else {
        <span class="badge bg-warning-subtle text-warning border border-warning-subtle px-3 py-2 rounded-pill fw-semibold shadow-sm d-inline-flex align-items-center gap-1">
          ⚠ Matrícula Pendiente (Servicios Restringidos)
        </span>
      }
    </div>
  </div>

  <div class="menu-grid">
    @for (item of menuItems; track item.title) {
      <div class="menu-card" (click)="navigateTo(item.route)">
        <span class="menu-icon">{{ item.icon }}</span>
        <h3>{{ item.title }}</h3>
      </div>
    }
  </div>

  <div class="logout-section">
    <button (click)="logout()" class="btn-logout-simple">Cerrar Sesión</button>
  </div>
</div>
