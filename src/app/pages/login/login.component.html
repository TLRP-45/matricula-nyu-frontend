<div class="login-page container-fluid min-vh-100 d-flex align-items-center justify-content-center p-4">
  <div class="card login-container shadow-lg border-0 overflow-hidden">
    <div class="card-body p-5">
      <form [formGroup]="loginForm" (ngSubmit)="logIn()">
        <div class="text-center mb-5">
          <h1 class="login-title h2 fw-bold mb-2">Bienvenido</h1>
          <p class="login-subtitle text-muted mb-0">Portal de la Universidad de Nueva York</p>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold small text-uppercase tracking-wider">RUT</label>
          <input formControlName="rut" type="text" appRutFormat class="form-control form-control-lg shadow-sm" placeholder="12.345.678-9">
        </div>

        <div class="mb-5">
          <label class="form-label fw-bold small text-uppercase tracking-wider">Contraseña</label>
          <input formControlName="password" type="password" class="form-control form-control-lg shadow-sm" placeholder="••••••••">
        </div>

        <div class="form-check mb-4 d-flex align-items-center">
          <input class="form-check-input mt-0" type="checkbox" formControlName="isAdmin" id="adminCheck">
          <label class="form-check-label small text-muted ms-2 cursor-pointer" for="adminCheck" style="cursor: pointer;">
            Entrar como administrador
          </label>
        </div>

        <button class="btn-login btn btn-lg w-100 py-3 fw-bold text-white border-0 shadow" type="submit">
          Acceder
        </button>
      </form>
    </div>
  </div>
</div>
