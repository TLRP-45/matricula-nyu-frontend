<div class="container">

  <div class="breadcrumb">
    Estudiante > <span>Confirmación</span>
  </div>

  <div class="card">
    <h3>Carrera</h3>
    <div class="input-box">
      {{ carrera }}
    </div>
  </div>

  <div class="card">
    <app-stepper [currentStep]="pasoActual"></app-stepper>
  </div>

  <div class="card">
    <h3>Confirmación de Matrícula</h3>
    <p class="subtitle">Revisa la información antes de confirmar</p>

    <div class="inner-card">
      <p><strong>Nombre:</strong> {{ nombre }}</p>
      <p><strong>Email:</strong> {{ email }}</p>
      <p><strong>Carrera:</strong> {{ carrera }}</p>
      <p><strong>Total pagado:</strong> ${{ total | number }}</p>
    </div>

    <div style="margin-top:15px;">
      <label>
        <input type="checkbox" [(ngModel)]="aceptaTerminos">
        Acepto los términos y condiciones de la universidad NYU
      </label>
    </div>

    @if (confirmando) {
    <div class="status-box info">
      <div class="loader"></div>
      <p class="status-title">Confirmando matrícula...</p>
    </div>
    }

    <div class="actions">

      <button class="primary-btn" (click)="volver()">
        ← Volver
      </button>

      <button 
        class="primary-btn"
        (click)="confirmarMatricula()"
        [disabled]="!aceptaTerminos || confirmando"
        style="margin-left:10px;">

        Confirmar matrícula →
      </button>

    </div>

  </div>

</div>
